services:
  app:
    build: .
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - composer_cache:/root/.composer/cache
    ports:
      - "9001:9000"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: errorlog
      APP_URL: https://assestment.cat-platform.web.id
      DB_CONNECTION: mysql
      DB_HOST: 172.17.0.1
      DB_PORT: 3306
      DB_DATABASE: assestment
      DB_USERNAME: assestment
      DB_PASSWORD: assestment
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database

  nginx:
    image: nginx:latest
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
    restart: unless-stopped

  vite-build:
    image: node:20-alpine
    restart: "no"
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: >
      sh -c "
      npm install &&
      npm install @rollup/rollup-linux-x64-musl lightningcss-linux-x64-musl -D --force &&
      npm run build
      "

volumes:
  composer_cache:
